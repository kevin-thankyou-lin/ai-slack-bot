version: 1
name: dexmate_sharpa_red_arrow_bolt_tip_default
description: >
  Default Dexmate Sharpa bolt-tip visual/FK calibration from the red-arrow
  measurement frame. Measurements are expressed as (up_cm, right_cm) from the
  screenshot/table reference frame: +up follows the table length arrow and
  +right follows the table-width arrow.

measurement_frame:
  origin: lower_left_table_reference_corner
  tuple_order:
    - up_cm
    - right_cm
  units: cm
  up_axis: positive_along_red_up_arrow
  right_axis: positive_along_red_right_arrow
  world_mapping:
    x_m: 0.02662000000000004 + right_cm / 100.0
    y_m: -1.4890000000000001 + up_cm / 100.0
    z_m: bolt_tip_world_z_m

table:
  usd: /home/linke/Projects/gr00t-main-wave-flange/groot/control/robot_model/model_data/dexmate/humanoid/vega_1_sharpa_wave/usd/table/table_177p8x74p7x74p3_cm.usd
  world_position_m:
    - 0.4
    - -0.6
    - 0.0
  world_rotation_z_deg: 90.0
  dimensions_cm:
    length: 177.8
    width: 74.676
    height: 74.32548
  table_top_world_z_m: 0.7432548

bolt:
  usd: /tmp/battat_bolt_asset/Collected_battat_bolt/battat_bolt.usd
  scale: 1.0
  z_offset_m: 0.02
  rendered_base_world_z_m: 0.7632548
  rendered_prim_translate_z_m: 0.7794428008177801
  tip_world_z_m: 0.8184078039403521

targets:
  right:
    measured_up_right_cm:
      - 64.6
      - 22.3
    renderer_table_xy_cm:
      - 64.6
      - 52.376
    world_xyz_m:
      - 0.24962000000000006
      - -0.8430000000000002
      - 0.8184078039403521
  left:
    measured_up_right_cm:
      - 109.8
      - 31.4
    renderer_table_xy_cm:
      - 109.8
      - 43.276
    world_xyz_m:
      - 0.34062000000000003
      - -0.391
      - 0.8184078039403521

default_base_pose:
  semantics: true_robot_front_heading
  source: >
    The center and height come from the visual/FK bolt-tip fit. The fitted
    heading was side-facing: the render labels previously called front_table
    and front_straight are actually side views. The true robot front is +90 deg
    from that fitted side/camera heading about the same center.
  xyz_yaw:
    units:
      xyz: m
      yaw: deg
    value:
      - -0.021610191922259214
      - -0.6053674260567798
      - -0.0414379358328964
      - 87.99548862484318
  fitted_side_heading_yaw_deg: -2.0045113751568344
  front_heading_correction_from_side_deg: 90.0
  opposite_side_front_yaw_deg: -92.00451137515684

optimization:
  mode: visual_fk_state_render_xyz_base_height_fit_to_bolt_tip
  right_index_tip_geom: right_index_elastomer_0
  left_index_tip_geom: left_index_elastomer_0
  right_index_target_bolt: 0
  left_index_target_bolt: 1
  optimized_base_offset_xyz_yaw:
