    - 0.8152183646378866
  right_xyz_residual_m:
    - -0.0002754224164426555
    - -0.0013680322223302843
    - 0.003189439302465513
  left_xyz_residual_m:
    - 0.00027542241644262777
    - 0.0013680322223303398
    - -0.003189439302465513
  residual_norm_m:
