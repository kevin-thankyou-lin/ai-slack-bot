artifacts:
  report: /tmp/dexmate_sharpa_birdview_bolts_red_arrow_tip_xyz_opt/dexmate_sharpa_red_arrow_up_right_bolt_tip_xyz_opt_report.txt
  stage: /tmp/dexmate_sharpa_birdview_bolts_red_arrow_tip_xyz_opt/dexmate_sharpa_red_arrow_up_right_bolt_tip_xyz_opt_stage.usda
  plot: /tmp/dexmate_red_arrow_reference_bolt_tip_xyz_optimization_result.png
  contact_sheet: /tmp/dexmate_red_arrow_bolt_tip_xyz_optimized_isaac_render/dexmate_red_arrow_bolt_tip_xyz_opt_isaac_contact_sheet.png
  render_view_label_correction:
    front_table: side_table
    front_straight: side_straight
    view_center_correct: true
    true_front_view: rotate_previous_front_view_90_deg_about_same_center

caveat: >
  The z component is a visual/FK base-height fit to the bolt tip. Check ground
  clearance before using it as a physical floor-standing robot pose.
