      xy: m
      yaw: deg
    value:
      - -0.021610191922259214
      - -0.6053674260567798
      - -2.0045113751568344
  z_offset_m: -0.0414379358328964
  right_tip_after_zopt_world_m:
    - 0.2493445775835574
    - -0.8443680322223305
    - 0.8215972432428176
  left_tip_after_zopt_world_m:
